version: 2
updates:
  # Design Forge ships no npm dependencies (markdownlint runs via npx in CI),
  # so only the GitHub Actions used by the workflows are tracked here.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
